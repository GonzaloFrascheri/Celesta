steps:
  - id: 'deploy-function'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - "-c"
      - |
        gcloud functions deploy procesador-cfes \
          --runtime nodejs20 \
          --trigger-http \
          --source=functions
          --entry-point=procesadorCFES \
          --set-env-vars=BIGQUERY_DATASET_ID=celesta_data,BIGQUERY_TABLE_ID=cfes \
          --region=us-central1 \
          --allow-unauthenticated
options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # 1. Construir la imagen de Docker del frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-repo/frontend:$SHORT_SHA'
      - '-f' # Especifica la ruta del Dockerfile
      - 'frontend/Dockerfile'
      - 'frontend/' # Especifica el contexto de la compilación

  # 2. Subir la imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-repo/frontend:$SHORT_SHA']

  # 3. Desplegar la nueva imagen en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'celesta-frontend' # <-- Nombre del nuevo servicio
      - '--image=us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-repo/frontend:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

# Opción de configuración para forzar el modo de logging
options:
  logging: CLOUD_LOGGING_ONLY
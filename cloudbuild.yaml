# cloudbuild.yaml (VERSIÓN FINAL Y ROBUSTA)

steps:
  # ------------------- FRONTEND PIPELINE -------------------

  # PASO 1: Construir la imagen del Frontend
  - id: 'build-frontend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-frontend:${SHORT_SHA}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'

  # PASO 2: Subir (Push) la imagen del Frontend a Artifact Registry
  - id: 'push-frontend'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-frontend:${SHORT_SHA}']
    waitFor: ['build-frontend'] # <-- Espera a que la imagen se construya

  # PASO 3: Desplegar el Frontend en Cloud Run
  - id: 'deploy-frontend'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'celesta-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-frontend:${SHORT_SHA}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    waitFor: ['push-frontend'] # <-- Espera a que la imagen se suba

  # ------------------- BACKEND PIPELINE -------------------

  # PASO 4: Construir la imagen del Backend (puede correr en paralelo al build del frontend)
  - id: 'build-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-backend:${SHORT_SHA}'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'
    waitFor: ['-'] # No espera a los pasos del frontend, puede iniciar en paralelo

  # PASO 5: Subir (Push) la imagen del Backend a Artifact Registry
  - id: 'push-backend'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-backend:${SHORT_SHA}']
    waitFor: ['build-backend'] # <-- Espera a que la imagen se construya

  # PASO 6: Desplegar el Backend en Cloud Run
  - id: 'deploy-backend'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'celesta-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/celesta-backend:${SHORT_SHA}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    waitFor: ['push-backend'] # <-- Espera a que la imagen se suba

options:
  logging: CLOUD_LOGGING_ONLY